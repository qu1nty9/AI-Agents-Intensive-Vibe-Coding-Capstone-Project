<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ReproBench Agent cover image</title>
  <desc id="desc">Evidence-first reproducibility audit dashboard cover for the ReproBench Agent Kaggle Freestyle submission.</desc>
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12355b"/>
      <stop offset="1" stop-color="#2367d1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#102033" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#f6f8fb"/>
  <rect x="0" y="0" width="1600" height="270" fill="url(#header)"/>

  <g transform="translate(90 76)">
    <text x="0" y="0" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Kaggle Freestyle</text>
    <text x="0" y="78" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="800">ReproBench Agent</text>
    <text x="0" y="132" fill="#eaf1ff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="500">Evidence-first reproducibility audits for ML experiments</text>
  </g>

  <g transform="translate(1040 72)">
    <rect x="0" y="0" width="430" height="136" rx="18" fill="#ffffff" opacity="0.12"/>
    <text x="30" y="54" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">5/5</text>
    <text x="130" y="52" fill="#eaf1ff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="650">expected verdicts</text>
    <text x="130" y="88" fill="#eaf1ff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="650">matched</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="88" y="324" width="1424" height="488" rx="24" fill="#ffffff" stroke="#dce3ed"/>

    <g transform="translate(136 372)">
      <text x="0" y="0" fill="#18202a" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">Audit Flow</text>
      <g transform="translate(0 52)">
        <rect x="0" y="0" width="230" height="88" rx="14" fill="#eaf1ff" stroke="#b8cffd"/>
        <text x="24" y="37" fill="#12355b" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Claim</text>
        <text x="24" y="65" fill="#52657d" font-family="Inter, Arial, sans-serif" font-size="18">accuracy = 1.0</text>

        <path d="M252 44 H326" stroke="#657285" stroke-width="4" stroke-linecap="round"/>
        <path d="M326 44 l-15 -10 v20 z" fill="#657285"/>

        <rect x="350" y="0" width="230" height="88" rx="14" fill="#f2f7f4" stroke="#bbdfc8"/>
        <text x="374" y="37" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Tools</text>
        <text x="374" y="65" fill="#52657d" font-family="Inter, Arial, sans-serif" font-size="18">run, compare, scan</text>

        <path d="M602 44 H676" stroke="#657285" stroke-width="4" stroke-linecap="round"/>
        <path d="M676 44 l-15 -10 v20 z" fill="#657285"/>

        <rect x="700" y="0" width="250" height="88" rx="14" fill="#fff7e6" stroke="#ffd58a"/>
        <text x="724" y="37" fill="#9a5b00" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Audit</text>
        <text x="724" y="65" fill="#52657d" font-family="Inter, Arial, sans-serif" font-size="18">leakage detected</text>

        <path d="M972 44 H1046" stroke="#657285" stroke-width="4" stroke-linecap="round"/>
        <path d="M1046 44 l-15 -10 v20 z" fill="#657285"/>

        <rect x="1070" y="0" width="250" height="88" rx="14" fill="#fdeceb" stroke="#f8b8b4"/>
        <text x="1094" y="37" fill="#b42318" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Verdict</text>
        <text x="1094" y="65" fill="#52657d" font-family="Inter, Arial, sans-serif" font-size="18">partially reproduced</text>
      </g>
    </g>

    <g transform="translate(136 574)">
      <text x="0" y="0" fill="#18202a" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">Evidence Artifacts</text>
      <g transform="translate(0 42)">
        <rect x="0" y="0" width="300" height="104" rx="16" fill="#f8fafc" stroke="#dce3ed"/>
        <text x="24" y="42" fill="#18202a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Benchmark suite</text>
        <text x="24" y="74" fill="#657285" font-family="Inter, Arial, sans-serif" font-size="18">5 controlled cases</text>

        <rect x="342" y="0" width="300" height="104" rx="16" fill="#f8fafc" stroke="#dce3ed"/>
        <text x="366" y="42" fill="#18202a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Tool trace</text>
        <text x="366" y="74" fill="#657285" font-family="Inter, Arial, sans-serif" font-size="18">MCP-facing audit calls</text>

        <rect x="684" y="0" width="300" height="104" rx="16" fill="#f8fafc" stroke="#dce3ed"/>
        <text x="708" y="42" fill="#18202a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Reports</text>
        <text x="708" y="74" fill="#657285" font-family="Inter, Arial, sans-serif" font-size="18">Markdown, JSON, dashboard</text>

        <rect x="1026" y="0" width="300" height="104" rx="16" fill="#f8fafc" stroke="#dce3ed"/>
        <text x="1050" y="42" fill="#18202a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Security</text>
        <text x="1050" y="74" fill="#657285" font-family="Inter, Arial, sans-serif" font-size="18">paths, secrets, redaction</text>
      </g>
    </g>
  </g>

  <g transform="translate(92 858)">
    <text x="0" y="0" fill="#657285" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="650">github.com/qu1nty9/AI-Agents-Intensive-Vibe-Coding-Capstone-Project</text>
  </g>
</svg>
